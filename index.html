<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa Verification</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        body {
            /* Matches the user's Telegram theme automatically! */
            background-color: var(--tg-theme-bg-color, #18222d);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #2b9ed4);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
            display: none; /* Hidden until AdsGram loads */
        }
        .btn:active {
            transform: scale(0.95);
        }
        #icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="icon">⏳</div>
    <title>Mikasa Premium Rewards</title>
    ...
    <h2 id="status">Daily Bonus Available!</h2>
    <p style="opacity: 0.7; max-width: 80%; font-size: 14px;">Watch a quick sponsor video to claim 2 hours of VIP access and priority delivery.</p>
    
    <button id="watchBtn" class="btn">🎁 Claim VIP Bonus</button>


    <script>
        // 1. Initialize Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Make it full screen

        const statusText = document.getElementById('status');
        const watchBtn = document.getElementById('watchBtn');
        const icon = document.getElementById('icon');

        // 2. Initialize AdsGram with YOUR Block ID
        const AdController = window.Adsgram.init({ blockId: "33046" });

        // 3. What happens when the user FINISHES the ad
        AdController.addEventListener('onReward', () => {
            icon.innerText = "✅";
            statusText.innerText = "Verified! Sending your files...";
            
            // Get the hidden verification code passed by your Python bot
            let startParam = tg.initDataUnsafe?.start_param || "";
            
            // Instantly redirect them back to the bot to get the file
            tg.openTelegramLink("https://t.me/GoogleBookxSearchBot?start=" + startParam);
            
            // Close the Mini App automatically
            setTimeout(() => {
                tg.close();
            }, 1500);
        });

        // 4. What happens if the ad fails to load
        AdController.addEventListener('onError', (err) => {
            icon.innerText = "⚠️";
            statusText.innerText = "Ad network error. Please try again.";
            watchBtn.style.display = "block";
            console.log("AdsGram Error:", err);
        });

        // 5. Setup the button
        icon.innerText = "🎁";
        statusText.innerText = "Ready to Unlock!";
        watchBtn.style.display = "block";

        watchBtn.addEventListener('click', () => {
            watchBtn.style.display = "none";
            icon.innerText = "🎬";
            statusText.innerText = "Playing Video...";
            AdController.show().catch((err) => {
                icon.innerText = "⚠️";
                statusText.innerText = "Error playing ad. Ensure you don't have an adblocker on.";
                watchBtn.style.display = "block";
            });
        });
    </script>
</body>
</html>
