<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa Premium Access</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="//libtl.com/sdk.js" data-zone="11064455" data-sdk="show_11064455"></script>

    <style>
        body {
            background-color: #18222d;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .timer-box { font-size: 22px; font-weight: bold; color: #f1c40f; margin-top: 20px; }
        .btn {
            background-color: #2b9ed4; color: #ffffff; border: none; padding: 16px 32px;
            font-size: 18px; border-radius: 12px; cursor: pointer; font-weight: bold;
            margin-top: 25px; display: none;
        }
    </style>
</head>
<body>

    <h2>⚡ Loading VIP Access</h2>
    <div id="timer" class="timer-box">⏳ Preparing: 15s</div>
    <button id="claimBtn" class="btn">🎁 Claim VIP Access</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let timeLeft = 15;
        const timerElement = document.getElementById('timer');
        const claimBtn = document.getElementById('claimBtn');

        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.style.display = 'none';
                claimBtn.style.display = 'inline-block';
            } else {
                timerElement.innerHTML = `⏳ Preparing Access: ${timeLeft}s`;
            }
        }, 1000);

        claimBtn.addEventListener('click', () => {
            // This calls the native Monetag SDK ad overlay
            show_11064455().then(() => {
                // AD COMPLETE: Route back to bot with payload
                const urlParams = new URLSearchParams(window.location.search);
                const startParam = urlParams.get('tgWebAppStartParam') || "";
                
                tg.openTelegramLink("https://t.me/GoogleBookxSearchBot?start=" + startParam);
                tg.close();
            }).catch((err) => {
                tg.showAlert("Please watch the full ad to unlock access!");
            });
        });
    </script>
</body>
</html>
