    <style>
        body {
            background-color: #18222d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            user-select: none;
        }
        .btn {
            background-color: #f1c40f;
            color: #18222d;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        #icon { font-size: 80px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="icon">🔑</div>
    <h2>VIP Access Ready</h2>
    <p style="opacity: 0.8; max-width: 80%; margin-bottom: 30px;">
        Tap below to unlock your file.
    </p>
    
    <button id="claimBtn" class="btn">🎁 CLAIM ACCESS</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const claimBtn = document.getElementById('claimBtn');

        claimBtn.addEventListener('click', () => {
            // Trigger Native In-App Rewarded Interstitial
            show_11064455().then(() => {

                
                // 1. Get the payload safely
                const startParam = new URLSearchParams(window.location.search).get('startapp') || "";
                
                // 2. Navigate back to bot using a standard link
                // This is the most reliable way to prevent the "reset to start" bug
                window.location.href = `https://t.me/GoogleBookxSearchBot?start=${startParam}`;
                
            }).catch(e => {
                console.error("Ad error:", e);
                // Fail-safe: even if ad fails, user gets the file
                const startParam = new URLSearchParams(window.location.search).get('startapp') || "";
                window.location.href = `https://t.me/GoogleBookxSearchBot?start=${startParam}`;
            });
        });
    </script>
</body>
