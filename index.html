<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Verification Portal</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Monetag Vignette Ad -->
    <script>(function(s){s.dataset.zone='11068939',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }
        .gateway-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            margin-bottom: 60px; /* Leaves space for the bottom banner */
        }
        .icon-shield {
            font-size: 64px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        h2 {
            font-size: 22px;
            margin: 0 0 10px 0;
            color: #f1c40f;
            letter-spacing: 0.5px;
        }
        p {
            font-size: 14px;
            color: #94a3b8;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }
        .timer-box {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 15px;
            font-size: 15px;
            font-weight: 600;
            color: #ef4444;
        }
        .success-box {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .btn-claim {
            background: #22c55e;
            color: #ffffff;
            border: none;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
            transition: background 0.2s;
        }
        .btn-claim:active {
            background: #16a34a;
        }
        /* Sticky Container for the Banner Ad */
        .banner-ad-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            padding: 5px 0;
            border-top: 1px solid #334155;
            z-index: 9999;
            min-height: 50px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="gateway-container">
        <!-- Main Verification View -->
        <div id="portalView">
            <div class="icon-shield">⚡</div>
            <h2>Link Verification</h2>
            <p>Please wait 30 seconds while your high-speed download corridor is initialized. Do not close this window.</p>
            
            <div class="timer-box" id="timerBox">
                ⏳ Initializing Session: <span id="countdown">30</span>s
            </div>
        </div>

        <!-- Success/Claim View -->
        <div class="success-box" id="successBox">
            <div class="icon-shield" style="animation: none;">✅</div>
            <h2>Corridor Unlocked</h2>
            <p>Your secure session is completely validated. Tap below to return to the console and claim your requested file.</p>
            <button class="btn-claim" id="closeBtn">📥 GET FILE NOW</button>
        </div>
    </div>

    <!-- Monetag Banner Ad -->
    <div class="banner-ad-container">
        <script>(function(s){s.dataset.zone='11068936',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let timeLeft = 30;
        const countdownEl = document.getElementById('countdown');
        const timerBox = document.getElementById('timerBox');
        const portalView = document.getElementById('portalView');
        const successBox = document.getElementById('successBox');
        const closeBtn = document.getElementById('closeBtn');

        // 30-Second Tracking Loop
        const interval = setInterval(() => {
            timeLeft--;
            countdownEl.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(interval);
                portalView.style.display = 'none';    
                successBox.style.display = 'block';   
            }
        }, 1000);

        // Native exit link to snap back into the direct message stream
        closeBtn.addEventListener('click', () => {
            tg.close();
        });
    </script>
</body>
</html>
