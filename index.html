<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa Premium Access</title>
    
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background-color: #18222d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .btn {
            background-color: #2b9ed4;
            color: #ffffff;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            display: none; /* Hidden until timer finishes */
            transition: transform 0.1s;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .timer-box {
            font-size: 22px;
            font-weight: bold;
            color: #f1c40f;
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="icon">⚡</div>
    <h2>Loading VIP File Stream</h2>
    <p style="opacity: 0.7; max-width: 80%; font-size: 14px; margin-bottom: 5px;">
        Please wait a moment while our sponsor network secures your priority download path...
    </p>
    
    <!-- Countdown Timer Element -->
    <div id="timer" class="timer-box">⏳ Initializing: 15s</div>
    
    <!-- Final Action Button -->
    <button id="claimBtn" class="btn">🎁 Claim VIP Access</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let timeLeft = 15;
        const timerElement = document.getElementById('timer');
        const claimBtn = document.getElementById('claimBtn');

        // Start the automated countdown
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.style.display = 'none'; 
                claimBtn.style.display = 'inline-block'; 
                tg.HapticFeedback.notificationOccurred('success'); // Buzz phone when ready
            } else {
                timerElement.innerHTML = `⏳ Preparing Access: ${timeLeft}s`;
            }
        }, 1000);

        // Monetag Link + Bot Redirect Flow
        claimBtn.addEventListener('click', () => {
            // Your Live Monetag Direct Link
            const monetagLink = "https://omg10.com/4/11064175";
            
            // Open ad link in user's system browser
            tg.openLink(monetagLink);
            
            // Extract the original file payload parameters
            let startParam = tg.initDataUnsafe?.start_param || "";
            
            // Bounce them straight back to the main bot conversation with file arguments
            setTimeout(() => {
                tg.openTelegramLink("https://t.me/GoogleBookxSearchBot?start=" + startParam);
                tg.close();
            }, 1500); 
        });
    </script>
</body>
</html>
