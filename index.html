<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikasa Premium Access</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src='//libtl.com/sdk.js' data-zone='11064455' data-sdk='show_11064455'></script>

    <style>
        body {
            background-color: #18222d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .btn {
            background-color: #2b9ed4;
            color: #ffffff;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        #icon { font-size: 80px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="icon">🎁</div>
    <h2>VIP Access Ready</h2>
    <p style="opacity: 0.8; max-width: 80%; margin-bottom: 30px;">
        Click below to unlock your file.
    </p>
    
    <button id="claimBtn" class="btn">⚡ WATCH AD TO UNLOCK</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // SDK Function: show_11064455()
        const claimBtn = document.getElementById('claimBtn');

        claimBtn.addEventListener('click', () => {
            // Trigger the native SDK ad
            show_11064455().then(() => {
                // Success: Ad finished, proceed to delivery
                const startParam = new URLSearchParams(window.location.search).get('startapp') || "";
                
                tg.openTelegramLink("https://t.me/GoogleBookxSearchBot?start=" + startParam);
                tg.close();
            }).catch((err) => {
                console.error("Ad failed", err);
                tg.showAlert("Please watch the ad to receive your files!");
            });
        });
    </script>
</body>
</html>
